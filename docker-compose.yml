services:
  app:
    build:
      context: ./backend
      dockerfile: docker/php/Dockerfile
    container_name: habitos_app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    depends_on:
      db:
        condition: service_healthy
    networks:
      - habitos_net

  web:
    image: nginx:1.27-alpine
    container_name: habitos_web
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - habitos_net

  db:
    image: mysql:8.4
    container_name: habitos_db
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: habitos_traked
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - habitos_net

volumes:
  db_data:

networks:
  habitos_net:
    driver: bridge
